services:
  - type: web
    name: sostek-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://sostek-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
